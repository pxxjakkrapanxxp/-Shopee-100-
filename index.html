    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1240px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
            flex-wrap: wrap;
            gap: 20px;
        }

        .main-title {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            display: flex;
            align-items: center; 
            gap: 10px;           
        }

        .shopee-logo {
            width: 32px;
            height: auto;
            object-fit: contain;
        }

        .right-header {
            text-align: right;
        }

        .breadcrumbs {
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 4px;
        }

        .sub-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            border: 1px solid #efefef;
        }

        .card-header {
            background-color: #ff5722; 
            color: white;
            text-align: center;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-desc {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.6;
            color: #111111;
            margin-bottom: 20px;
            min-height: 48px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .author {
            color: #ff5722;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .author::before {
            content: "👤";
        }

        .time {
            color: #868e96;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .time::before {
            content: "⏱️";
        }

        .toggle-reviews-btn {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            color: #495057;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            width: 100%;
        }

        .toggle-reviews-btn:hover {
            background: #e9ecef;
        }

        .reviews-box {
            display: none;
            background: #fdfdfd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px dashed #ced4da;
        }

        .reviews-box.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .review-item {
            font-size: 12px;
            color: #495057;
            padding: 6px 0;
            border-bottom: 1px solid #f1f3f5;
            line-height: 1.5;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .review-user {
            font-weight: 600;
            color: #fab005;
            margin-bottom: 2px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
            display: inline-block;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-orange {
            background-color: #e65100;
            color: white;
        }

        .btn-grey {
            background-color: #eceff1;
            color: #374151;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .header-section {
                flex-direction: column-reverse;
                align-items: flex-start;
            }
            .right-header {
                text-align: left;
                width: 100%;
            }
        }
    </style>
